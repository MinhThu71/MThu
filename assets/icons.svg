<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Biểu tượng Logo game -->
  <symbol id="logo" viewBox="0 0 48 48">
    <text y="36" font-size="36" font-family="sans-serif">✊</text>
  </symbol>

  <!-- Búa (Rock) – nắm đấm -->
  <symbol id="rock" viewBox="0 0 80 80">
    <g fill="currentColor">
      <!-- Thân nắm đấm -->
      <rect x="18" y="34" width="44" height="30" rx="10" ry="10"/>
      <!-- Ngón tay cuộn -->
      <rect x="22" y="20" width="10" height="18" rx="5" ry="5"/>
      <rect x="34" y="16" width="10" height="20" rx="5" ry="5"/>
      <rect x="46" y="18" width="10" height="18" rx="5" ry="5"/>
      <!-- Ngón cái -->
      <ellipse cx="14" cy="46" rx="7" ry="5" transform="rotate(-20 14 46)"/>
    </g>
  </symbol>

  <!-- Bao (Paper) – bàn tay mở -->
  <symbol id="paper" viewBox="0 0 80 80">
    <g fill="currentColor">
      <!-- Lòng bàn tay -->
      <rect x="22" y="38" width="36" height="26" rx="8" ry="8"/>
      <!-- Ngón tay duỗi thẳng -->
      <rect x="24" y="14" width="9"  height="28" rx="4" ry="4"/>
      <rect x="35" y="10" width="9"  height="30" rx="4" ry="4"/>
      <rect x="46" y="12" width="9"  height="28" rx="4" ry="4"/>
      <!-- Ngón út -->
      <rect x="57" y="18" width="8"  height="24" rx="4" ry="4"/>
      <!-- Ngón cái mở rộng -->
      <rect x="10" y="36" width="16" height="9"  rx="4" ry="4" transform="rotate(-30 18 40)"/>
    </g>
  </symbol>

  <!-- Kéo (Scissors) – hai ngón chĩa ra -->
  <symbol id="scissors" viewBox="0 0 80 80">
    <g fill="currentColor">
      <!-- Lòng bàn tay -->
      <rect x="22" y="42" width="36" height="24" rx="8" ry="8"/>
      <!-- Ngón trỏ duỗi -->
      <rect x="24" y="14" width="9"  height="32" rx="4" ry="4"/>
      <!-- Ngón giữa duỗi -->
      <rect x="35" y="12" width="9"  height="34" rx="4" ry="4"/>
      <!-- Ngón áp út và ngón út gập -->
      <rect x="46" y="30" width="9"  height="16" rx="4" ry="4"/>
      <rect x="57" y="32" width="8"  height="14" rx="4" ry="4"/>
      <!-- Ngón cái -->
      <rect x="10" y="40" width="16" height="9"  rx="4" ry="4" transform="rotate(-30 18 44)"/>
      <!-- Dấu cắt kéo -->
      <line x1="28" y1="14" x2="39" y2="22" stroke="var(--bg-color, #0f172a)" stroke-width="2"/>
    </g>
  </symbol>

  <!-- Icon loa bật -->
  <symbol id="sound-on" viewBox="0 0 24 24">
    <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
  </symbol>

  <!-- Icon loa tắt -->
  <symbol id="sound-off" viewBox="0 0 24 24">
    <path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
  </symbol>

  <!-- Icon mặt trời (theme sáng) -->
  <symbol id="sun" viewBox="0 0 24 24">
    <path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0zM7.05 18.36l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0z"/>
  </symbol>

  <!-- Icon mặt trăng (theme tối) -->
  <symbol id="moon" viewBox="0 0 24 24">
    <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
  </symbol>

  <!-- Icon trợ giúp -->
  <symbol id="help" viewBox="0 0 24 24">
    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
  </symbol>

  <!-- Icon đóng -->
  <symbol id="close" viewBox="0 0 24 24">
    <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
  </symbol>

  <!-- Icon cờ VN -->
  <symbol id="flag-vi" viewBox="0 0 24 24">
    <rect width="24" height="24" rx="4" fill="#da251d"/>
    <polygon points="12,4 14.5,10.5 21,10.5 16,14.5 18,21 12,17 6,21 8,14.5 3,10.5 9.5,10.5" fill="#ffff00"/>
  </symbol>

  <!-- Icon cờ Anh -->
  <symbol id="flag-en" viewBox="0 0 24 24">
    <rect width="24" height="24" rx="4" fill="#012169"/>
    <path d="M0,0 L24,16 M24,0 L0,16" stroke="#fff" stroke-width="3"/>
    <path d="M0,0 L24,16 M24,0 L0,16" stroke="#C8102E" stroke-width="1.5"/>
    <path d="M12,0 V24 M0,8 H24" stroke="#fff" stroke-width="5"/>
    <path d="M12,0 V24 M0,8 H24" stroke="#C8102E" stroke-width="3"/>
  </symbol>

  <!-- Icon settings/gear -->
  <symbol id="settings" viewBox="0 0 24 24">
    <path fill="currentColor" d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
  </symbol>

  <!-- Icon trophy -->
  <symbol id="trophy" viewBox="0 0 24 24">
    <path fill="currentColor" d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/>
  </symbol>
</svg>
